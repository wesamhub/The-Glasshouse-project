<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e9ecef; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 400px; 
        }
        h2 { color: #2c3e50; margin-top: 0; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #34495e; font-weight: bold; font-size: 14px; }
        textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        button { 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            padding: 12px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
        }
        button:hover { background-color: #004494; }
        .admin-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            font-size: 12px; 
            color: #adb5bd; 
            text-decoration: none; 
        }
        .admin-link:hover { color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Supplier Contact Form</h2>
        <p>Submit your inventory requests or system feedback below.</p>
        <form action="/" method="POST">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
            <button type="submit">Send to Admin</button>
        </form>
        <a href="/admin/login" class="admin-link">System Administration</a>
    </div>
</body>
</html>
